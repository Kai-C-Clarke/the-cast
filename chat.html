<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { min-height: 100vh; display: flex; flex-direction: column; }

#chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}

#chat-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#char-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  object-fit: cover;
  object-position: top;
}

#char-info h1 { font-size: 1.4rem; }
#char-info p { font-size: 0.85rem; opacity: 0.7; margin-top: 2px; }

#back-link {
  margin-left: auto;
  font-size: 0.8rem;
  opacity: 0.6;
  text-decoration: none;
  transition: opacity 0.2s;
}
#back-link:hover { opacity: 1; }

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.message {
  max-width: 75%;
  padding: 12px 16px;
  line-height: 1.6;
  font-size: 0.95rem;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user { align-self: flex-end; }
.message.char { align-self: flex-start; }

.typing-indicator {
  align-self: flex-start;
  padding: 12px 16px;
  display: none;
}
.typing-indicator.visible { display: flex; gap: 4px; align-items: center; }
.dot { width: 8px; height: 8px; border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

#input-area {
  padding: 20px 24px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
  border-top: 1px solid rgba(255,255,255,0.1);
}

#user-input {
  flex: 1;
  padding: 12px 16px;
  border: none;
  outline: none;
  resize: none;
  font-size: 0.95rem;
  line-height: 1.5;
  background: transparent;
  min-height: 48px;
  max-height: 120px;
}

#send-btn {
  padding: 12px 24px;
  border: none;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  white-space: nowrap;
}
#send-btn:hover { filter: brightness(1.1); }
#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

// Get character from URL
const params = new URLSearchParams(window.location.search);
const charKey = params.get('c') || 'askian';
const char = CHARACTERS[charKey] || CHARACTERS['askian'];

// Apply theme
document.body.classList.add(charKey === 'askian' ? 'ian' : charKey);

// Show Pearl's poems panel if on her page
if (charKey === 'pearl') {
  const pearlPoems = document.getElementById('pearl-poems');
  const pearlTribute = document.getElementById('pearl-tribute');
  if (pearlPoems) pearlPoems.style.display = 'block';
    pearlTribute.style.display = 'block';
}

// Populate header
document.getElementById('char-avatar').src = char.avatar;
document.getElementById('char-avatar').alt = char.name;
document.getElementById('char-name').textContent = char.name;
document.getElementById('char-desc').textContent = char.desc;
document.getElementById('opening-message').textContent = char.opening;
document.getElementById('user-input').placeholder = char.placeholder;
document.getElementById('send-btn').textContent = char.sendLabel;
document.title = `Chat with ${char.name} — The Cast`;

// Conversation history
const history = [];

// Persistent user identity — generated once, stored forever in localStorage
function getUserId() {
  let uid = localStorage.getItem('thecast_user_id');
  if (!uid) {
    uid = 'u_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
    localStorage.setItem('thecast_user_id', uid);
  }
  return uid;
}
const userId = getUserId();

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const typingEl = document.getElementById('typing');

// ── TTS ──────────────────────────────────────────────────────────────────────
const VOICED_CHARS = ['dave'];
let soundOn = true;
let audioUnlocked = false;

// Show 📻 toggle for voiced characters
if (VOICED_CHARS.includes(charKey)) {
  const toggleBtn = document.getElementById('sound-toggle');
  if (toggleBtn) {
    toggleBtn.style.display = 'inline-block';
    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      soundOn = !soundOn;
      toggleBtn.textContent = soundOn ? '📻' : '🔇';
      toggleBtn.style.opacity = soundOn ? '0.8' : '0.4';
    });
  }
}

async function speakText(text, character) {
  if (!soundOn) return;
  console.log('[tts] calling for:', character);
  try {
    const res = await fetch('/.netlify/functions/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, character })
    });
    const data = await res.json();
    if (!data.audio) { console.log('[tts] no audio in response'); return; }
    const binary = atob(data.audio);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const url  = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => URL.revokeObjectURL(url);
    const playPromise = audio.play();
    if (playPromise) playPromise.catch(e => console.log('[tts] play blocked:', e.message));
  } catch(e) {
    console.log('[tts] error:', e.message);
  }
}

// On first interaction: unlock AudioContext, speak opening
if (VOICED_CHARS.includes(charKey)) {
  const unlockAndGreet = () => {
    if (audioUnlocked) return;
    audioUnlocked = true;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      src.start(0);
      ctx.resume();
    } catch(e) { console.log('[tts] AudioContext error:', e); }
    const openingEl = document.getElementById('opening-message');
    if (openingEl && openingEl.textContent.trim()) {
      speakText(openingEl.textContent.trim(), charKey);
    }
  };
  document.addEventListener('click',      unlockAndGreet, { once: true });
  document.addEventListener('keydown',    unlockAndGreet, { once: true });
  document.addEventListener('touchstart', unlockAndGreet, { once: true });
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  messagesEl.insertBefore(div, typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  if (role === 'char' && VOICED_CHARS.includes(charKey)) {
    speakText(text, charKey);
  }
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage(text, 'user');
  history.push({ role: 'user', content: text });

  sendBtn.disabled = true;
  typingEl.classList.add('visible');
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: history,
        system_prompt: char.system,
        user_id: userId,
        character: charKey
      })
    });

    const data = await res.json();
    const reply = data.reply || 'I appear to be indisposed. Try again shortly.';

    typingEl.classList.remove('visible');
    addMessage(reply, 'char');
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    typingEl.classList.remove('visible');
    addMessage('Something went wrong. Try again in a moment.', 'char');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.focus();
</script>
